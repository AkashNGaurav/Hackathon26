version: '3.9'

services:
  vector-db:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.sqlite
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/fintech.db
      GEMINI_API_URL: ${GEMINI_API_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      QDRANT_HOST: vector-db
      QDRANT_PORT: 6333
      SECRET_KEY: ${SECRET_KEY:-8998e2ae7a2ee313d65cff92222b61dbc68d21a63b9de7afd4b273ae85730ade}
    volumes:
      - sqlite_data:/app/data
    depends_on:
      - vector-db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  qdrant_data:
  sqlite_data:
